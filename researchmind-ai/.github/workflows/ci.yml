name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint backend syntax
        run: python -m compileall backend
      - name: Run database migrations
        env:
          JWT_SECRET: ci-secret-value-at-least-32-characters
          DATABASE_URL: sqlite:///./ci_researchmind.db
        run: alembic upgrade head
      - name: Run backend tests
        env:
          JWT_SECRET: ci-secret-value-at-least-32-characters
          DATABASE_URL: sqlite:///./ci_researchmind.db
          CHROMA_PATH: ./ci_chroma
          REPORTS_DIR: ./ci_reports
          LOGS_DIR: ./ci_logs
        run: pytest backend/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t researchmind-backend:ci .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t researchmind-frontend:ci .
      - name: Validate compose config
        run: docker compose -f docker-compose.yml config
