services:
  - type: web
    name: researchmind-ai-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./researchmind.db
      - key: CHROMA_PATH
        value: ./chroma_store
      - key: REPORTS_DIR
        value: ./reports
      - key: LOGS_DIR
        value: ./logs
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
