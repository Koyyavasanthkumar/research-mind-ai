services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite:////data/researchmind.db
      CHROMA_PATH: /data/chroma_store
      REPORTS_DIR: /data/reports
      LOGS_DIR: /data/logs
    restart: unless-stopped
    volumes:
      - backend_data:/data
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend

volumes:
  backend_data:
  nginx_cache:
